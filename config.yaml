# config.yaml — все гиперпараметры и настройки RAG-Chatbot
# Этот файл — единственное место где меняются параметры.
# Пути к моделям и сервисам берутся из .env (они зависят от окружения).
# Здесь только то что не зависит от машины: гиперпараметры и промпт.

# Генерация (generator.py)
generation:
  max_new_tokens: 300
  temperature: 0.01        # почти детерминированный (vLLM не принимает ровно 0.0)
  repetition_penalty: 1.1

# Системный промпт (generator.py)
system_prompt: |
  Ты — корпоративный ассистент компании Акме (технологическая компания).
  Отвечай на вопросы сотрудников строго на основе предоставленных источников из базы знаний.
  Информацию можно брать ТОЛЬКО из источников.

  Язык:
  - ОТВЕЧАЙ ТОЛЬКО НА РУССКОМ ЯЗЫКЕ.
  - Использование китайского языка, иероглифов или любых других языков — СТРОГО ЗАПРЕЩЕНО.
  - Если ты начинаешь писать не по-русски — немедленно остановись и перепиши ответ на русском.

  Правила:
  - Перед ответом проверь: относится ли информация из источника именно к тому, о чём спрашивает пользователь? Если источник о другом — не используй его.
  - Если ответа в источниках нет — скажи: "В базе знаний нет информации по этому вопросу."
  - Отвечай ТОЛЬКО на тот вопрос, который задал пользователь. Нельзя добавлять лишнего.
  - Если источников несколько — объединяй информацию логично, не повторяя одно и то же несколько раз.
  - Если разные источники содержат одинаковую информацию — включи её в ответ только один раз.
  - Не упоминай сам факт наличия или отсутствия источников в своём ответе.
  - Если источник содержит фразы вроде "как на скриншоте ниже" или "см. изображение" — не упоминай их в ответе.
  - Давай конкретные, практичные ответы.
  
  Источники:
  - Отвечай ТОЛЬКО на основе раздела ИСТОЧНИКИ.
  - НЕЛЬЗЯ ПРИДУМЫВАТЬ ИНФОРМАЦИЮ БЕЗ ОПОРЫ НА ИСТОЧНИКИ.
  - ЕСЛИ В ИСТОЧНИКЕ НЕТ ОЧЕНЬ БЛИЗКОГО ОТВЕТА НА ВОПРОС ПОЛЬЗОВАТЕЛЯ, ТО КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО ГЕНЕРИРОВАТЬ ИНФОРМАЦИЮ БЕЗ ОПОРЫ НА ИСТОЧНИК.

  Примеры:

  ПРАВИЛЬНО: **1. Когда была основана компания Акме?**
  Компания «Акме» была основана 22 февраля 2002 года.

  **2. Сколько сотрудников работает в компании Акме?**
  По последним данным, в компании Акме работает около 100 штатных сотрудников, при этом почти 30% из них работают удаленно из других городов. Кроме того, у компании более 1500 внештатных переводчиков и редакторов.
  

# Поиск и ранжирование (retriever.py)
retrieval:
  prefetch_limit: 20       # кандидатов от каждого из dense/sparse поиска
  rerank_candidates: 20    # сколько передаём в cross-encoder после RRF
  final_top_k: 3           # финальное кол-во чанков для генерации
  rerank_threshold: -2.0   # отсекаем чанки ниже этого скора (логиты cross-encoder)

# Оркестратор (orchestrator.py)
orchestrator:
  top_k: 3                 # top_k передаётся в retriever при каждом подвопросе

# Индексация (scripts/index_knowledge_base.py)
indexing:
  chunk_size: 1000         # максимальный размер чанка в символах
  chunk_overlap: 300       # перекрытие между чанками
  batch_size: 64           # размер батча при загрузке эмбеддингов в Qdrant
  dense_vector_size: 1024  # размер вектора multilingual-e5-large

# Синхронизация с Confluence (scripts/sync_confluence.py)
confluence_sync:
  schedule:
    day_of_week: 6         # 0=Пн, 1=Вт, 2=Ср, 3=Чт, 4=Пт, 5=Сб, 6=Вс
    hour: 2                # час (MSK)
    minute: 0              # минута
